<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#78350F" />
    </linearGradient>
    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>

  <!-- Circular background badge -->
  <rect width="64" height="64" rx="16" fill="url(#bottleGrad)" />
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-opacity="0.6" />

  <!-- Perfume Cap -->
  <rect x="26" y="10" width="12" height="7" rx="1.5" fill="url(#goldGrad)" />
  <!-- Perfume Spray Nozzle Collar -->
  <rect x="28" y="17" width="8" height="4" fill="#F59E0B" />

  <!-- Perfume Bottle Body -->
  <path d="M 18,23 C 18,21 21,21 21,21 L 43,21 C 43,21 46,21 46,23 L 48,51 C 48,53.5 45.5,55 43,55 L 21,55 C 18.5,55 16,53.5 16,51 Z" 
        fill="none" 
        stroke="url(#goldGrad)" 
        stroke-width="2.5" 
        stroke-linejoin="round" />

  <!-- Liquid Fill / Interior Glow -->
  <path d="M 20,32 L 44,32 L 45.5,50 C 45.5,52 43.5,53 41.5,53 L 22.5,53 C 20.5,53 18.5,52 18.5,50 Z" 
        fill="url(#goldGrad)" 
        opacity="0.3" />

  <!-- Golden Emblem J.R. Badge -->
  <rect x="24" y="34" width="16" height="12" rx="2" fill="#0F172A" stroke="url(#goldGrad)" stroke-width="1" />
  <text x="32" y="42.5" font-family="'Cinzel', 'Playfair Display', Georgia, serif" font-size="7" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle">JR</text>

  <!-- Sparkle / Reflection -->
  <path d="M 22,25 L 22,48" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" opacity="0.4" />
</svg>
